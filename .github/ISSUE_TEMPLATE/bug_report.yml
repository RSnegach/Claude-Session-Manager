name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open the tracker
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Tracker Version
      placeholder: e.g. 1.5.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows Version
      placeholder: e.g. Windows 11 24H2
    validations:
      required: false
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: e.g. 3.12.4
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Additional Context
      description: Screenshots, error messages, or anything else relevant
    validations:
      required: false
